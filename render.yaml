# ============================================================
# render.yaml — Infrastructure-as-Code for Render.com
# NeuroSense AI Backend
# ============================================================
# Instructions:
#   1. Push this file to your GitHub repo root.
#   2. On Render.com → New → Blueprint → connect the repo.
#   3. Render auto-reads this file and creates the service.
# ============================================================

services:
  - type: web
    name: neurosense-api
    runtime: python
    region: oregon          # Free-tier available region
    plan: free              # Free tier: 512 MB RAM, spins down after 15 min idle
    
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    
    # Environment variables — set values in Render Dashboard → Environment
    envVars:
      - key: SUPABASE_URL
        sync: false         # Set manually in Render dashboard (never commit secrets!)
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
    
    # Health check — Render pings this URL to decide if the service is healthy
    healthCheckPath: /health
    
    # Auto-deploy whenever you push to the main branch
    autoDeploy: true
